name: Refresh Spotify top artists

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch top artists
        run: python scripts/fetch-spotify.py
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh spotify top artists'
          title: 'chore: refresh spotify top artists'
          branch: chore/refresh-spotify
          delete-branch: true
          body: |
            Automated monthly refresh of `data/spotify-top-artists.json`.
            Triggered by the scheduled workflow — merge to update the live site.
